<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/menu.css') }}">
</head>
<body>

    <div class="titleSection">
        <h1>Animals</h1>
        <h2>{{ date }}</h2>
    </div>

    <section class="sideMenu">
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/animals">Animals</a>
            <a href="/register">Register</a>
        </div>
    </section>

    <section>


        <table>
            <tr>
                <th>Tag</th>
                <th>Arrival Day</th>
                <th>Race</th>
                <th>Sex</th>
                <th>Birth day</th>
                <th>Weight</th>
            </tr>

            {% for animal in animal_list %}

            <tr>
                <th>{{ animal['tag'] }}</th>
                <th>{{ animal['arrival_day'] }}</th>
                <th>{{ animal['race'] }}</th>
                <th>{{ animal['sex'] }}</th>
                <th>{{ animal['birth_day'] }}</th>
                <th>{{ animal['weight'] }}</th>
                <th>
                    <form action="/delete" method="post">
                        <input type="hidden" name="animal_id" value="{{ animal['id'] }}">
                        <button class="deleteConfirmBtn" type="submit">X - Excluir</button>
                    </form>

                    <button class="editBtn">Edit</button>


                    <form class="editForm" style="display: none;" action="/edit" method="post">
                        <input type="hidden" name="animal_id" value="{{ animal['id'] }}">
                        <input type="number" name="weight" placeholder="New weight">
                        <button class="editConfirmBtn" type="submit">Confirm</button>
                    </form>
                </th>
            </tr>
            {% endfor %}
        </table>
    </section>
    
</body>
</html>

<script src="{{ url_for('static', filename='js/animals.js') }}"></script>
